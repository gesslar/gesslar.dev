<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    A Very Serious and Professional Website for a Very Serious and Professional
    Dev made by a Very Serious and Professional Dev. I'm not kidding. This is
    the label on the tin. If this sounds incredible to you, then I genuinely
    have little recourse but to grant you welcome.
  </title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      max-width: 100vw;
      max-height: 100vh;
      overflow: hidden;
      position: relative;
      background: #1a1a2e;
    }

    .emoji {
      position: absolute;
      font-size: 48px;
      line-height: 1;
      user-select: none;
      transition: none;
    }

    #toilet {
      z-index: 2;
    }

    #poop {
      z-index: 1;
    }

    .emoji.serious {
      font-size: 18px;
      font-weight: 900;
      font-family: monospace;
      color: #fff;
      letter-spacing: 2px;
      white-space: nowrap;
    }
  </style>
</head>

<body>
  <div id="toilet" class="emoji">🚽</div>
  <div id="poop" class="emoji">💩</div>

  <script>
    const notSoSeriouses = ["🫠", "😈", "👄", "🫦", "😂"]
    const serious = "🧐"
    const toilet = document.getElementById('toilet');
    const poop = document.getElementById('poop');
    const body = document.body

    const W = () => document.documentElement.clientWidth;
    const H = () => document.documentElement.clientHeight;

    const state = {
      toilet: { x: W() / 2, y: H() / 2, vx: 0, vy: 0, scale: 1 },
      poop: { x: 100, y: 100, angle: 0, scale: 1 },
    };

    const toiletSpeed = 5;
    const poopSpeed = 2.8;
    const fleeDistance = 200;
    const jitter = 0.3;

    function clamp(val, min, max) {
      return Math.max(min, Math.min(max, val));
    }

    function distance(a, b) {
      return Math.hypot(a.x - b.x, a.y - b.y);
    }

    function angleBetween(from, to) {
      return Math.atan2(to.y - from.y, to.x - from.x);
    }

    function updateToilet() {
      const t = state.toilet;
      const p = state.poop;
      const dist = distance(t, p);

      if (dist < fleeDistance) {
        const away = angleBetween(p, t);
        t.vx += Math.cos(away) * toiletSpeed * 0.3;
        t.vy += Math.sin(away) * toiletSpeed * 0.3;
      }

      // random wandering
      t.vx += (Math.random() - 0.5) * jitter;
      t.vy += (Math.random() - 0.5) * jitter;

      // damping
      t.vx *= 0.95;
      t.vy *= 0.95;

      // speed cap
      const speed = Math.hypot(t.vx, t.vy);
      if (speed > toiletSpeed) {
        t.vx = (t.vx / speed) * toiletSpeed;
        t.vy = (t.vy / speed) * toiletSpeed;
      }

      const thw = toilet.offsetWidth * t.scale / 2, thh = toilet.offsetHeight * t.scale / 2;
      t.x = clamp(t.x + t.vx, thw, W() - thw);
      t.y = clamp(t.y + t.vy, thh, H() - thh);

      // bounce off walls
      if (t.x <= thw || t.x >= W() - thw) t.vx *= -1;
      if (t.y <= thh || t.y >= H() - thh) t.vy *= -1;

      t.scale = 0.4 + (t.y / H()) * 1.2;
    }

    function updatePoop() {
      const p = state.poop;
      const t = state.toilet;

      const targetAngle = angleBetween(p, t);

      // smooth turning
      let diff = targetAngle - p.angle;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      p.angle += diff * 0.08;

      const phw = poop.offsetWidth * p.scale / 2, phh = poop.offsetHeight * p.scale / 2;
      p.x = clamp(p.x + Math.cos(p.angle) * poopSpeed, phw, W() - phw);
      p.y = clamp(p.y + Math.sin(p.angle) * poopSpeed, phh, H() - phh);

      p.scale += (state.toilet.scale - p.scale) * 0.05;
    }

    function render() {
      toilet.style.transform = `translate(${state.toilet.x - toilet.offsetWidth / 2}px, ${state.toilet.y - toilet.offsetHeight / 2}px) scale(${state.toilet.scale})`;

      const wobble = Math.sin(Date.now() / 100) * 10;
      poop.style.transform = `translate(${state.poop.x - poop.offsetWidth / 2}px, ${state.poop.y - poop.offsetHeight / 2}px) rotate(${wobble}deg) scale(${state.poop.scale})`;
    }

    function loop() {
      updateToilet();
      updatePoop();
      render();
      requestAnimationFrame(loop);
    }

    const emojiHuggingString = "url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='40' height='48' viewport='0 0 100 100' style='fill:black;font-size:24px;'><text y='50%'>{{RIGHT_HERE_OFFICER}}</text></svg>\") 16 0, auto"

    function setSerious(val) {
      if (val) {
        toilet.textContent = 'PROFESSIONAL';
        toilet.classList.add('serious');
        poop.textContent = 'SERIOUS';
        poop.classList.add('serious');
        body.style.cursor = emojiHuggingString.replace("{{RIGHT_HERE_OFFICER}}", serious)
      } else {
        toilet.textContent = '🚽';
        toilet.classList.remove('serious');
        poop.textContent = '💩';
        poop.classList.remove('serious');
        body.style.cursor = emojiHuggingString.replace("{{RIGHT_HERE_OFFICER}}", notSoSeriouses[Math.floor(Math.random() * notSoSeriouses.length)])
      }
    }

    setSerious(true);

    document.addEventListener('mousedown', () => setSerious(false));
    document.addEventListener('mouseup', () => setSerious(true));
    document.addEventListener('touchstart', () => setSerious(false), { passive: true });
    document.addEventListener('touchend', () => setSerious(true));

    loop();
  </script>
</body>

</html>
